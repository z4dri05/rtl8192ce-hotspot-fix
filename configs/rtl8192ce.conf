# Fix RTL8192CE AP mode:
#   ips=0      → Disables Idle Power Save (chip goes to sleep and stops beaconing)
#   fwlps=0    → Disables Firmware Low Power Save
#   aspm=0     → Disables Active State Power Management on PCIe bus
#   swenc=1    → Forces software encryption (hardware crypto corrupts WPA2 packets in AP mode)
options rtl8192ce ips=0 fwlps=0 aspm=0 swenc=1
